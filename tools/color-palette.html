<!DOCTYPE html>
<html lang="id">
<head>
  <script>
    (function() {
      const t = localStorage.getItem('toolboxid-theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark-mode');
        document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Nunito', sans-serif; background: #fefcf7; color: #1a1225; overflow-x: clip; -webkit-font-smoothing: antialiased; }
    .page { max-width: 960px; margin: 0 auto; padding: 0 32px 80px; }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 24px 0 20px; }
    .logo { display: flex; align-items: center; gap: 10px; font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; color: #1a1225; text-decoration: none; }
    .logo-box { width: 36px; height: 36px; background: #1a1225; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; animation: logo3dFlip 6s ease-in-out infinite; box-shadow: 0 4px 12px rgba(255,107,107,.35); }
    @keyframes logo3dFlip { 0%,30%,100%{transform:rotateY(0deg) scale(1)} 42%,58%{transform:rotateY(180deg) scale(1.1)} }
    .btn-back { font-family: 'Nunito', sans-serif; font-size: 13.5px; font-weight: 800; padding: 8px 17px; border-radius: 100px; cursor: pointer; transition: background .18s, color .18s; color: #6b6580; background: transparent; border: none; text-decoration: none; }

    .tool-icon-big { width: 68px; height: 68px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; background: #fefce8; border: 2.5px solid #fef08a; box-shadow: 0 6px 20px rgba(234,179,8,.15); flex-shrink: 0; }
    .tool-category-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #92400e; background: #fefce8; border: 2px solid #fef08a; border-radius: 100px; padding: 4px 14px; margin-bottom: 8px; font-family: 'Space Mono', monospace; }
    .tool-header-text h1 { font-size: clamp(24px, 3.5vw, 34px); font-weight: 900; letter-spacing: -.8px; margin-bottom: 6px; }

    .controls-card { background: #fff; border: 2.5px solid #f0ebff; border-radius: 22px; padding: 28px 30px; margin-bottom: 24px; }
    .ctrl-row { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }

    .btn-action.outline:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #e8e4f0; }

    .toast { position: fixed; bottom: 28px; right: 28px; background: #1a1225; color: #fff; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; padding: 14px 22px; border-radius: 14px; box-shadow: 0 12px 40px rgba(26,18,37,.3); z-index: 9999; display: flex; align-items: center; gap: 10px; transform: translateY(80px); opacity: 0; transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s; pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }

    .footer { text-align: center; padding: 24px 0 0; border-top: 2px dashed #f0ebff; margin-top: 32px; }

    .dark-mode nav .logo { color: #e2daf0 !important; }

</style>

<div class="page">
  <nav>
    <a class="logo" href="../index.html#tools-section">
      <div class="logo-box" aria-hidden="true"><img src="../logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;" /></div>
      <span>ToolboxID</span>
    </a>
    <a class="btn-back" href="../index.html#tools-section">← Kembali</a>
  </nav>

  <div class="tool-header">
    <div class="tool-header-inner">
      <div class="tool-icon-big" aria-hidden="true">🎨</div>
      <div class="tool-header-text">
        <div class="tool-category-badge">🎨 Desain</div>
        <h1>Color Palette Generator</h1>
        <p>Generate palet warna harmonis dari satu warna dasar. Klik swatch untuk copy kode warna.</p>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-card">
    <div class="ctrl-row">
      <div class="ctrl-group">
        <label>Warna Dasar</label>
        <div class="color-input-wrap">
          <input type="color" id="colorPicker" value="#7c3aed" oninput="onPickerChange(this.value)" />
          <input type="text" class="hex-input" id="hexInput" value="#7c3aed" placeholder="#000000" maxlength="7" oninput="onHexChange(this.value)" />
        </div>
      </div>
      <div class="ctrl-group">
        <label>Skema Warna</label>
        <select id="schemeSelect" onchange="generate()">
          <option value="analogous">🔗 Analogous</option>
          <option value="complementary">🔄 Complementary</option>
          <option value="triadic">🔺 Triadic</option>
          <option value="tetradic">◼ Tetradic</option>
          <option value="monochromatic" selected>⬜ Monochromatic</option>
          <option value="shades">🌑 Shades & Tints</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Jumlah Warna</label>
        <div class="count-wrap">
          <button class="count-btn" onclick="changeCount(-1)">−</button>
          <span class="count-val" id="countVal">6</span>
          <button class="count-btn" onclick="changeCount(1)">+</button>
        </div>
      </div>
      <button class="btn-generate" id="generate-btn" onclick="randomize()">🎲 Acak</button>
    </div>
  </div>

  <!-- Palette Horizontal -->
  <div class="palette-wrap">
    <div class="palette-grid" id="paletteGrid"></div>
    <!-- Color Cards -->
    <div class="color-cards" id="colorCards"></div>
    <!-- Format converter for selected color -->
    <div class="format-card" id="formatCard">
      <h3>Format — klik swatch untuk pilih</h3>
      <div class="format-row"><span class="format-label">HEX</span><span class="format-val" id="fmtHex">—</span><button class="format-copy" onclick="copyFmt('fmtHex')">Copy</button></div>
      <div class="format-row"><span class="format-label">RGB</span><span class="format-val" id="fmtRgb">—</span><button class="format-copy" onclick="copyFmt('fmtRgb')">Copy</button></div>
      <div class="format-row"><span class="format-label">HSL</span><span class="format-val" id="fmtHsl">—</span><button class="format-copy" onclick="copyFmt('fmtHsl')">Copy</button></div>
      <div class="format-row"><span class="format-label">CSS Var</span><span class="format-val" id="fmtCss">—</span><button class="format-copy" onclick="copyFmt('fmtCss')">Copy</button></div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <button class="btn-action amber" id="copy-all-btn" onclick="copyAllHex()">📋 Copy Semua HEX</button>
    <button class="btn-action outline" id="export-css-btn" onclick="exportCSS()">⬇️ Export CSS Variables</button>
  </div>

  <footer class="footer">
    <p>Dibuat dengan <span class="ft-heart">❤️</span> oleh <span class="ft-brand">Ali Akbar</span> · Gratis untuk semua orang</p>
  </footer>
</div>

<div class="toast" id="toast"><span id="toastEmoji">🎨</span><span id="toastMsg">Copied!</span></div>

<script>
  // ── Color math helpers ──
  function hexToHsl(hex) {
    let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let h,s,l=(max+min)/2;
    if(max===min){h=s=0}else{const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}}
    return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
  }
  function hslToHex(h,s,l) {
    s/=100;l/=100;
    const a=s*Math.min(l,1-l);
    const f=n=>{const k=(n+h/30)%12;const color=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*color).toString(16).padStart(2,'0')};
    return `#${f(0)}${f(8)}${f(4)}`;
  }
  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }
  function getContrastColor(hex) {
    const [r,g,b] = hexToRgb(hex);
    return (r*299+g*587+b*114)/1000 > 128 ? '#1a1225' : '#ffffff';
  }

  function generatePalette(baseHex, scheme, count) {
    const [h,s,l] = hexToHsl(baseHex);
    const colors = [];
    switch(scheme) {
      case 'monochromatic':
        for(let i=0;i<count;i++) colors.push(hslToHex(h, s, Math.round(20+(60/(count-1))*i)));
        break;
      case 'analogous':
        for(let i=0;i<count;i++) colors.push(hslToHex((h - 30 + (60/(count-1))*i + 360) % 360, s, l));
        break;
      case 'complementary':
        for(let i=0;i<count;i++) colors.push(i%2===0 ? hslToHex(h, s, Math.max(25,Math.min(75, l - 20 + (40/(Math.ceil(count/2)-1||1))*Math.floor(i/2)))) : hslToHex((h+180)%360, s, Math.max(25,Math.min(75, l - 20 + (40/(Math.ceil(count/2)-1||1))*Math.floor(i/2)))));
        break;
      case 'triadic':
        for(let i=0;i<count;i++) { const base = [h, (h+120)%360, (h+240)%360][i%3]; const ll = Math.max(25, Math.min(75, l + (i >= 3 ? 15 : 0))); colors.push(hslToHex(base, s, ll)); }
        break;
      case 'tetradic':
        for(let i=0;i<count;i++) { const base = [h, (h+90)%360, (h+180)%360, (h+270)%360][i%4]; colors.push(hslToHex(base, s, i>=4?Math.min(l+15,80):l)); }
        break;
      case 'shades':
        for(let i=0;i<count;i++) colors.push(hslToHex(h, s, Math.round(10+(80/(count-1))*i)));
        break;
    }
    return colors;
  }

  let palette = [];
  let colorCount = 6;
  let selectedColor = null;

  function generate() {
    const hex = document.getElementById('hexInput').value;
    if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) { showToast('⚠️', 'Masukkan HEX yang valid!'); return; }
    const scheme = document.getElementById('schemeSelect').value;
    palette = generatePalette(hex, scheme, colorCount);
    renderPalette();
  }

  function renderPalette() {
    const grid = document.getElementById('paletteGrid');
    const cards = document.getElementById('colorCards');
    grid.innerHTML = '';
    cards.innerHTML = '';

    palette.forEach((color, i) => {
      // Swatch bar
      const sw = document.createElement('div');
      sw.className = 'palette-swatch';
      sw.style.background = color;
      sw.innerHTML = `
        <div class="swatch-copy-badge">Click to copy</div>
        <div class="swatch-info">
          <div class="swatch-hex">${color.toUpperCase()}</div>
        </div>`;
      sw.onclick = () => { copyHex(color); selectColor(color); };
      grid.appendChild(sw);

      // Card
      const card = document.createElement('div');
      card.className = 'color-card';
      const rgb = hexToRgb(color);
      const [h,s,l] = hexToHsl(color);
      const labels = ['Primary','Secondary','Accent','Light','Dark','Neutral','Highlight','Subtle','Deep','Vivid'];
      card.innerHTML = `
        <div class="color-card-swatch" style="background:${color}"></div>
        <div class="color-card-info">
          <div class="color-card-hex">${color.toUpperCase()}</div>
          <div class="color-card-label">${labels[i] || 'Color '+(i+1)}</div>
        </div>`;
      card.onclick = () => { copyHex(color); selectColor(color); };
      cards.appendChild(card);
    });

    if (palette.length > 0) selectColor(palette[0]);
  }

  function selectColor(hex) {
    selectedColor = hex;
    const [h,s,l] = hexToHsl(hex);
    const [r,g,b] = hexToRgb(hex);
    document.getElementById('fmtHex').textContent = hex.toUpperCase();
    document.getElementById('fmtRgb').textContent = `rgb(${r}, ${g}, ${b})`;
    document.getElementById('fmtHsl').textContent = `hsl(${h}, ${s}%, ${l}%)`;
    document.getElementById('fmtCss').textContent = `--color: ${hex.toUpperCase()};`;
    document.querySelector('#formatCard h3').textContent = `Format — ${hex.toUpperCase()}`;
  }

  function copyFmt(id) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => showToast('✅', 'Copied!'));
  }

  function copyHex(hex) {
    navigator.clipboard.writeText(hex.toUpperCase()).then(() => showToast('🎨', `${hex.toUpperCase()} disalin!`));
  }

  function copyAllHex() {
    const all = palette.map(c => c.toUpperCase()).join(', ');
    navigator.clipboard.writeText(all).then(() => showToast('✅', 'Semua HEX disalin!'));
  }

  function exportCSS() {
    let css = ':root {\n';
    palette.forEach((c, i) => { css += `  --color-${i+1}: ${c.toUpperCase()};\n`; });
    css += '}';
    const blob = new Blob([css], {type:'text/css'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'palette.css';
    a.click();
    showToast('⬇️', 'CSS Variables diexport!');
  }

  function onPickerChange(val) {
    document.getElementById('hexInput').value = val;
    generate();
  }

  function onHexChange(val) {
    if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
      document.getElementById('colorPicker').value = val;
      generate();
    }
  }

  function randomize() {
    const chars = '0123456789abcdef';
    let color = '#';
    for (let i = 0; i < 6; i++) {
      color += chars[Math.floor(Math.random() * 16)];
    }
    document.getElementById('hexInput').value = color;
    document.getElementById('colorPicker').value = color;
    generate();
  }

  function changeCount(delta) {
    colorCount = Math.max(2, Math.min(12, colorCount + delta));
    document.getElementById('countVal').textContent = colorCount;
    generate();
  }

  function showToast(emoji, msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastEmoji').textContent = emoji;
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2500);
  }

  generate();
</script>
</body>
</html>
