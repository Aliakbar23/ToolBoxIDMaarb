<!DOCTYPE html>
<html lang="id">
<head>
  <script>
    (function() {
      const t = localStorage.getItem('toolboxid-theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark-mode');
        document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base64 Text Encoder & Decoder — ToolboxID</title>
  <link rel="icon" href="../favicon.png" type="image/png" />
  <meta name="description" content="Encode teks biasa ke Base64 atau decode string Base64 kembali ke teks biasa secara instan, aman, dan 100% offline." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,800;0,900;1,800;1,900&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Nunito', sans-serif; background: #fefcf7; color: #1a1225; overflow-x: clip; -webkit-font-smoothing: antialiased; }
    .page { max-width: 900px; margin: 0 auto; padding: 0 32px 80px; }

    /* ── Navbar ── */
    nav { display: flex; justify-content: space-between; align-items: center; padding: 24px 0 20px; }
    .logo { display: flex; align-items: center; gap: 10px; font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; color: #1a1225; text-decoration: none; }
    .logo-box { width: 36px; height: 36px; background: #1a1225; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; animation: logo3dFlip 6s ease-in-out infinite; box-shadow: 0 4px 12px rgba(255,107,107,.15); }
    @keyframes logo3dFlip { 0%,30%,100%{transform:rotateY(0deg) scale(1)} 42%,58%{transform:rotateY(180deg) scale(1.1)} }
    .btn-back { font-family: 'Nunito', sans-serif; font-size: 13.5px; font-weight: 800; padding: 8px 17px; border-radius: 100px; cursor: pointer; transition: background .18s, color .18s; color: #6b6580; background: transparent; border: none; text-decoration: none; }
    .btn-back:hover { background: #f0ebff; color: #7c3aed; }

    /* ── Tool Header ── */
    .tool-header { padding: 40px 0 28px; }
    .tool-header-inner { display: flex; align-items: flex-start; gap: 20px; }
    .tool-icon-big { width: 68px; height: 68px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; background: #fdf2f8; border: 2.5px solid #fbcfe8; box-shadow: 0 6px 20px rgba(236,72,153,.12); flex-shrink: 0; animation: iconBounce .6s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes iconBounce { from{opacity:0;transform:scale(.5) rotate(-15deg)} to{opacity:1;transform:scale(1) rotate(0deg)} }
    .tool-category-badge { display: inline-flex; font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #be185d; background: #fdf2f8; border: 2px solid #fbcfe8; border-radius: 100px; padding: 4px 14px; margin-bottom: 8px; font-family: 'Space Mono', monospace; }
    .tool-header-text h1 { font-size: clamp(24px, 3.5vw, 34px); font-weight: 900; letter-spacing: -.8px; margin-bottom: 6px; animation: fadeUp .5s cubic-bezier(.22,1,.36,1) .1s both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
    .tool-header-text p { font-size: 14.5px; color: #6b6580; line-height: 1.7; animation: fadeUp .5s cubic-bezier(.22,1,.36,1) .18s both; }

    /* ── Main Panel ── */
    .main-card { background: #fff; border: 2.5px solid #f0ebff; border-radius: 24px; padding: 32px; box-shadow: 0 10px 30px rgba(124,58,237,0.02); margin-bottom: 24px; animation: fadeUp .5s cubic-bezier(.22,1,.36,1) .25s both; }

    /* Mode Selection Tabs */
    .mode-tabs { display: grid; grid-template-columns: 1fr 1fr; background: #faf8ff; border: 2.5px solid #f0ebff; border-radius: 14px; padding: 4px; margin-bottom: 24px; }
    .mode-btn { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; border: none; background: transparent; padding: 10px; border-radius: 10px; cursor: pointer; color: #6b6580; transition: all .15s; }
    .mode-btn.active { background: #ec4899; color: #fff; box-shadow: 0 4px 10px rgba(236,72,153,.25); }
    .mode-btn:hover:not(.active) { background: #f0ebff; color: #7c3aed; }

    /* Textareas split */
    .editor-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .editor-group label { font-size: 13.5px; font-weight: 800; color: #4c4660; }
    .textarea-base64 { width: 100%; font-family: 'Space Mono', monospace; font-size: 13px; line-height: 1.6; padding: 16px; border: 2.5px solid #e8e4f0; border-radius: 16px; background: #fff; color: #1a1225; outline: none; transition: border-color .2s; min-height: 140px; }
    .textarea-base64:focus { border-color: #fbcfe8; }
    
    .textarea-base64.error { border-color: #ef4444; background: #fef2f2; }

    /* Controls */
    .controls-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
    .action-btns { display: flex; gap: 8px; }
    .btn-action { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14.5px; padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; transition: transform .15s, box-shadow .15s; }
    .btn-action.pink { background: #ec4899; color: #fff; box-shadow: 0 4px 0 #be185d; }
    .btn-action.pink:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #be185d; }
    .btn-action.pink:active { transform: translateY(2px); box-shadow: 0 2px 0 #be185d; }
    .btn-action.outline { background: #fff; color: #6b6580; border: 2px solid #e8e4f0; }
    .btn-action.outline:hover { background: #faf8ff; border-color: #fbcfe8; color: #ec4899; }
    .btn-action.danger:hover { background: #fef2f2; border-color: #fca5a5; color: #ef4444; }

    /* Toast */
    .toast { position: fixed; bottom: 28px; right: 28px; background: #1a1225; color: #fff; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; padding: 14px 22px; border-radius: 14px; box-shadow: 0 12px 40px rgba(26,18,37,.3); z-index: 9999; transform: translateY(80px); opacity: 0; transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s; pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }

    .footer { text-align: center; padding: 24px 0 0; border-top: 2px dashed #f0ebff; margin-top: 32px; }
    .footer p { font-size: 13px; color: #c4b9d8; font-weight: 700; }
    .ft-heart { color: #ff6b6b; } .ft-brand { color: #7c3aed; font-weight: 900; }

    @media (max-width: 600px) {
      .page { padding: 0 16px 60px; }
    }
  
    /* ── Dark Mode Overrides ── */
    html.dark-mode body, body.dark-mode { background: #120c1a !important; color: #e2daf0 !important; }
    .dark-mode nav .logo { color: #e2daf0 !important; }
    .dark-mode nav .logo-box { background: #2b1f3d !important; }
    .dark-mode .btn-back { color: #a59cb5 !important; }
    .dark-mode .btn-back:hover { background: #2b223d !important; color: #c084fc !important; }
    .dark-mode .tool-header-text h1 { color: #fff !important; }
    .dark-mode .tool-header-text p { color: #a59cb5 !important; }
    .dark-mode .main-card, .dark-mode .result-card, .dark-mode .file-list-card, .dark-mode .preview-card, .dark-mode .history-card, .dark-mode .editor-box, .dark-mode .preview-box, .dark-mode .output-box, .dark-mode .tool-panel { background: #1d162a !important; border-color: #2b223d !important; color: #e2daf0 !important; }
    .dark-mode input, .dark-mode textarea, .dark-mode select { background: #120c1a !important; border-color: #2b223d !important; color: #fff !important; }
    .dark-mode .footer { border-top-color: #2b223d !important; }
    .dark-mode .footer p, .dark-mode .footer p span { color: #6b607a !important; }
    .dark-mode .file-item, .dark-mode .item-row { background: #120c1a !important; border-color: #2b223d !important; }
    .dark-mode .file-name, .dark-mode .item-name { color: #fff !important; }
    .dark-mode .action-btn { background: #1d162a !important; border-color: #2b223d !important; color: #a59cb5 !important; }
    .dark-mode .action-btn:hover { border-color: #7c3aed !important; color: #c084fc !important; background: #2b223d !important; }
    .dark-mode .toast { background: #2b223d !important; border: 1.5px solid #7c3aed !important; color: #fff !important; }
    .dark-mode .option-group label { color: #a59cb5 !important; }
</style>
</head>
<body>
<div class="page">
  <nav>
    <a class="logo" href="../index.html#tools-section"><div class="logo-box" aria-hidden="true"><img src="../logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;" /></div><span>ToolboxID</span></a>
    <a class="btn-back" href="../index.html#tools-section">← Kembali</a>
  </nav>

  <div class="tool-header">
    <div class="tool-header-inner">
      <div class="tool-icon-big">🔠</div>
      <div class="tool-header-text">
        <div class="tool-category-badge">🔠 Teks · Utility</div>
        <h1>Base64 Text Encoder & Decoder</h1>
        <p>Ubah teks biasa menjadi format Base64 yang aman, atau terjemahkan kode Base64 kembali ke teks asli secara instan dan aman.</p>
      </div>
    </div>
  </div>

  <div class="main-card">
    <!-- Mode Selection -->
    <div class="mode-tabs">
      <button class="mode-btn active" id="btnEncode" onclick="setMode('encode')">🔒 Encode (Teks ➔ Base64)</button>
      <button class="mode-btn" id="btnDecode" onclick="setMode('decode')">🔓 Decode (Base64 ➔ Teks)</button>
    </div>

    <!-- Input Box -->
    <div class="editor-group">
      <label id="inputLabel" for="inputText">Input Teks Biasa</label>
      <textarea id="inputText" class="textarea-base64" placeholder="Ketik atau tempel teks biasa di sini..." oninput="processBase64()"></textarea>
    </div>

    <!-- Output Box -->
    <div class="editor-group">
      <label id="outputLabel" for="outputText">Output Base64</label>
      <textarea id="outputText" class="textarea-base64" readonly placeholder="Hasil konversi akan muncul di sini..."></textarea>
    </div>

    <!-- Actions -->
    <div class="controls-row">
      <div class="action-btns">
        <button class="btn-action outline danger" onclick="clearAll()">🗑️ Bersihkan</button>
        <button class="btn-action outline" id="btnSample" onclick="loadSample()">📄 Contoh</button>
      </div>
      <button class="btn-action pink" onclick="copyOutput()">📋 Salin Hasil</button>
    </div>
  </div>

  <footer class="footer">
    <p>Dibuat dengan <span class="ft-heart">❤️</span> oleh <span class="ft-brand">Ali Akbar</span> · Gratis untuk semua orang</p>
  </footer>
</div>

<div class="toast" id="toast">Done!</div>

<script>
  let activeMode = 'encode';

  function setMode(mode) {
    activeMode = mode;
    document.getElementById('btnEncode').classList.toggle('active', mode === 'encode');
    document.getElementById('btnDecode').classList.toggle('active', mode === 'decode');

    const inputLabel = document.getElementById('inputLabel');
    const outputLabel = document.getElementById('outputLabel');
    const inputArea = document.getElementById('inputText');
    const outputArea = document.getElementById('outputText');

    inputArea.classList.remove('error');

    if (mode === 'encode') {
      inputLabel.textContent = 'Input Teks Biasa';
      outputLabel.textContent = 'Output Base64';
      inputArea.placeholder = 'Ketik atau tempel teks biasa di sini...';
    } else {
      inputLabel.textContent = 'Input Base64';
      outputLabel.textContent = 'Output Teks Biasa';
      inputArea.placeholder = 'Tempel kode Base64 di sini... (Contoh: VG9vbGJveElE)';
    }

    // Process again with new mode
    processBase64();
  }

  function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('outputText').value = '';
    document.getElementById('inputText').classList.remove('error');
    showToast('Input dibersihkan!');
  }

  function loadSample() {
    const inputArea = document.getElementById('inputText');
    if (activeMode === 'encode') {
      inputArea.value = 'ToolboxID adalah kumpulan tools yang luar biasa!';
    } else {
      inputArea.value = 'VG9vbGJveElEIGFkYWxhaCBrdW1wdWxhbiB0b29scyB5YW5nIGx1YXIgYmloYXNhIQ==';
    }
    processBase64();
  }

  function processBase64() {
    const input = document.getElementById('inputText').value;
    const outputArea = document.getElementById('outputText');
    const inputArea = document.getElementById('inputText');

    inputArea.classList.remove('error');

    if (!input.trim()) {
      outputArea.value = '';
      return;
    }

    try {
      if (activeMode === 'encode') {
        // UTF-8 friendly Base64 encoding using btoa + encodeURIComponent
        const encoded = btoa(unescape(encodeURIComponent(input)));
        outputArea.value = encoded;
      } else {
        // UTF-8 friendly Base64 decoding using atob + decodeURIComponent
        const decoded = decodeURIComponent(escape(atob(input.trim())));
        outputArea.value = decoded;
      }
    } catch (err) {
      inputArea.classList.add('error');
      outputArea.value = `❌ KESALAHAN: Input Base64 tidak valid!\nDeskripsi: ${err.message}`;
    }
  }

  function copyOutput() {
    const output = document.getElementById('outputText').value;
    if (!output || output.startsWith('❌ KESALAHAN')) {
      showToast('Tidak ada data hasil konversi yang valid!');
      return;
    }
    navigator.clipboard.writeText(output).then(() => {
      showToast('📋 Hasil disalin ke clipboard!');
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Pre-fill
  loadSample();
</script>
</body>
</html>
